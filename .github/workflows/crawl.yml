name: 유니뷰 자동 크롤링

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 패키지 설치
        run: npm install

      - name: 크롤러 실행
        run: node crawler.js

      - name: 변경된 데이터 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/items.json
          git diff --staged --quiet && echo "변경 사항 없음" || git commit -m "자동 크롤링 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
